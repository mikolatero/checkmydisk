name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: SwiftPM test
        run: swift test

      - name: Xcode test
        run: |
          xcodebuild test \
            -project CheckMyDisk.xcodeproj \
            -scheme CheckMyDisk \
            -destination 'platform=macOS' \
            -testLanguage en -testRegion US \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            DEVELOPMENT_TEAM= \
            ENABLE_HARDENED_RUNTIME=NO
